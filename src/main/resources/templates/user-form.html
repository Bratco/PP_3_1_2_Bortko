<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>User Form</title>
    <style>
        .form-group { margin-bottom: 15px; }
        label { display: inline-block; width: 100px; }
        input, select { padding: 5px; width: 200px; }
        button { padding: 5px 10px; margin: 2px; cursor: pointer; }
        .error { color: red; font-size: 12px; }
        .container { margin: 20px; padding: 20px; border: 1px solid #ddd; border-radius: 5px; max-width: 500px; }
        h1 { color: #333; }
        .btn-save { background-color: #4CAF50; color: white; border: none; padding: 10px 20px; }
        .btn-cancel { background-color: #f44336; color: white; text-decoration: none; padding: 8px 15px; display: inline-block; margin-left: 10px; }
    </style>
</head>
<body>
<div class="container">
    <h1 th:text="${user.id == null ? 'Create New User' : 'Edit User'}">User Form</h1>

    <form th:action="@{${user.id == null ? '/admin/add' : '/admin/update/' + user.id}}" method="post">
        <!-- CSRF Token -->
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <input type="hidden" name="id" th:value="${user.id}" th:if="${user.id != null}"/>

        <div class="form-group">
            <label>Username:</label>
            <input type="text" name="username" th:value="${user.username}" required/>
        </div>

        <div class="form-group">
            <label>Password:</label>
            <input type="password" name="password" th:required="${user.id == null}"/>
            <span th:if="${user.id != null}" class="error">Leave blank to keep current password</span>
        </div>

        <div class="form-group">
            <label>Name:</label>
            <input type="text" name="name" th:value="${user.name}" required/>
        </div>

        <div class="form-group">
            <label>Age:</label>
            <input type="number" name="age" th:value="${user.age}"/>
        </div>

        <div class="form-group">
            <label>Email:</label>
            <input type="email" name="email" th:value="${user.email}"/>
        </div>

        <div class="form-group">
            <label>Roles:</label>
            <select multiple name="roleIds" size="4">
                <option th:each="role : ${allRoles}"
                        th:value="${role.id}"
                        th:text="${role.name}"
                        th:selected="${user.roles != null && user.roles.contains(role)}">
                </option>
            </select>
            <br/>
            <small>Hold Ctrl/Cmd to select multiple roles</small>
        </div>

        <div class="form-group">
            <button type="submit" class="btn-save">Save</button>
            <a th:href="@{/admin}" class="btn-cancel">Cancel</a>
        </div>
    </form>
</div>
</body>
</html>
