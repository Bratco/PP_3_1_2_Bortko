<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit User</title>
    <style>
        .form-group { margin-bottom: 15px; }
        label { display: inline-block; width: 100px; }
        input, select { padding: 5px; width: 200px; }
        button { padding: 5px 10px; margin: 2px; }
        .error { color: red; font-size: 12px; }
    </style>
</head>
<body>
<h1>Edit User</h1>

<form th:action="@{/admin/update/{id}(id=${user.id})}" method="post">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

    <div class="form-group">
        <label>Username:</label>
        <input type="text" name="username" th:value="${user.username}" required/>
    </div>

    <div class="form-group">
        <label>Password:</label>
        <input type="password" name="password" placeholder="Leave blank to keep current"/>
        <span class="error">Leave blank to keep current password</span>
    </div>

    <div class="form-group">
        <label>Name:</label>
        <input type="text" name="name" th:value="${user.name}" required/>
    </div>

    <div class="form-group">
        <label>Age:</label>
        <input type="number" name="age" th:value="${user.age}"/>
    </div>

    <div class="form-group">
        <label>Email:</label>
        <input type="email" name="email" th:value="${user.email}"/>
    </div>

    <div class="form-group">
        <label>Roles:</label>
        <select multiple name="roleIds" size="3">
            <option th:each="role : ${allRoles}"
                    th:value="${role.id}"
                    th:text="${role.name}"
                    th:selected="${user.roles.contains(role)}">
            </option>
        </select>
        <br/>
        <small>Hold Ctrl/Cmd to select multiple roles</small>
    </div>

    <div class="form-group">
        <button type="submit">Update User</button>
        <a th:href="@{/admin}">Cancel</a>
    </div>
</form>
</body>
</html>
