<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel - User Management</title>
    <style>
        table { border-collapse: collapse; width: 100%; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #4CAF50; color: white; }
        .add-form { margin-bottom: 20px; padding: 20px; background-color: #f9f9f9; border: 1px solid #ddd; }
        .form-group { margin-bottom: 10px; display: inline-block; margin-right: 15px; }
        label { display: inline-block; width: 80px; }
        input, select { padding: 5px; width: 200px; }
        .btn { padding: 5px 10px; margin: 2px; text-decoration: none; display: inline-block; }
        .btn-edit { background-color: #2196F3; color: white; }
        .btn-delete { background-color: #f44336; color: white; }
        .btn-add { background-color: #4CAF50; color: white; padding: 10px 20px; border: none; cursor: pointer; }
        .logout-btn { background-color: #f44336; color: white; padding: 5px 10px; margin-left: 20px; }
    </style>
</head>
<body>
<h1>User Management System <span style="font-size: 14px;">(Admin Panel)</span></h1>

<div sec:authorize="isAuthenticated()">
    Welcome, <span sec:authentication="name"></span>!
    <form th:action="@{/logout}" method="post" style="display: inline;">
        <button type="submit" class="logout-btn">Logout</button>
    </form>
</div>

<hr/>

<div class="add-form">
    <h3>Add New User</h3>
    <form action="/admin/add" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div class="form-group">
            <label>Username:</label>
            <input type="text" name="username" required/>
        </div>
        <div class="form-group">
            <label>Password:</label>
            <input type="password" name="password" required/>
        </div>
        <div class="form-group">
            <label>Name:</label>
            <input type="text" name="name" required/>
        </div>
        <div class="form-group">
            <label>Age:</label>
            <input type="number" name="age"/>
        </div>
        <div class="form-group">
            <label>Email:</label>
            <input type="email" name="email"/>
        </div>
        <div class="form-group">
            <label>Roles:</label>
            <select name="roleIds" multiple size="3">
                <option th:each="role : ${allRoles}" th:value="${role.id}" th:text="${role.name}"></option>
            </select>
            <small>Hold Ctrl/Cmd to select multiple</small>
        </div>
        <button type="submit" class="btn-add">Add User</button>
    </form>
</div>

<h3>User List</h3>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Username</th>
        <th>Name</th>
        <th>Age</th>
        <th>Email</th>
        <th>Roles</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="user : ${users}">
        <td th:text="${user.id}"></td>
        <td th:text="${user.username}"></td>
        <td th:text="${user.name}"></td>
        <td th:text="${user.age}"></td>
        <td th:text="${user.email}"></td>
        <td>
            <span th:each="role : ${user.roles}" th:text="${role.name} + ' '"></span>
        </td>
        <td>
            <a th:href="@{/admin/edit/{id}(id=${user.id})}" class="btn-edit">Edit</a>
            <form th:action="@{/admin/delete/{id}(id=${user.id})}" method="post" style="display:inline;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn-delete" onclick="return confirm('Are you sure?')">Delete</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
